<div class="tab-wrap">
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="camera">Camera</button>
    <button class="tab-btn" data-tab="control">Control</button>
    <button class="tab-btn" data-tab="map">Map</button>
  </div>
  <div class="tab-content">

    <div class="tab-pane" id="tab-control">
      <div class="ctrl-grid">
        <section>
          <h3>Servos</h3>
          <div class="row spread"><label for="servo1Range">Servo 1</label><strong><span id="servo1Val">90</span>°</strong></div>
          <input id="servo1Range" type="range" min="0" max="180" step="1" value="90">
          <div class="row spread"><label for="servo2Range">Servo 2</label><strong><span id="servo2Val">90</span>°</strong></div>
          <input id="servo2Range" type="range" min="0" max="180" step="1" value="90">
        </section>
        <section>
          <h3>Buzzer</h3>
          <div class="row spread"><label for="buzzerPitchRange">Pitch</label><strong><span id="buzzerPitchVal">2000</span> Hz</strong></div>
          <input id="buzzerPitchRange" type="range" min="200" max="5000" step="10" value="2000">
          <div class="row spread"><label for="buzzerTimeRange">On time</label><strong><span id="buzzerTimeVal">1.0</span> s</strong></div>
          <input id="buzzerTimeRange" type="range" min="0.1" max="5.0" step="0.1" value="1.0">
          <div class="row"><button id="buzzBtn" style="width:100%">Buzz</button></div>
        </section>
        <section>
          <h3>LED</h3>
          <div class="row spread"><label for="ledRRange">Red</label><strong><span id="ledRVal">0</span></strong></div>
          <input id="ledRRange" type="range" min="0" max="255" step="1" value="0">
          <div class="row spread"><label for="ledGRange">Green</label><strong><span id="ledGVal">0</span></strong></div>
          <input id="ledGRange" type="range" min="0" max="255" step="1" value="0">
          <div class="row spread"><label for="ledBRange">Blue</label><strong><span id="ledBVal">0</span></strong></div>
          <input id="ledBRange" type="range" min="0" max="255" step="1" value="0">
          <div class="row spread"><label>LED</label><button id="ledToggleBtn">LED OFF</button></div>
        </section>
      </div>
    </div>

    <div class="tab-pane active" id="tab-camera" style="position:relative">
      <img id="camFeed" alt="" style="display:block;width:100%;height:100%;object-fit:contain;background:#000;transform:scaleX(-1)">
      <div style="position:absolute;left:0;top:0;bottom:0;width:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:rgba(0,0,0,0.35);padding:8px 0">
        <span style="color:#A2C594;font-size:10px;font-weight:700;letter-spacing:.05em">S1</span>
        <input id="camServo1" type="range" min="0" max="180" step="1" value="90"
               style="writing-mode:vertical-lr;height:calc(100% - 56px);width:22px;accent-color:#A2C594;cursor:pointer;flex-shrink:0">
        <span id="camServo1Val" style="color:#fff;font-size:10px;font-weight:600">90°</span>
      </div>
    </div>

    <div class="tab-pane" id="tab-map">
      <canvas id="vizCanvas" style="display:block;width:100%;height:100%;cursor:grab"></canvas>
    </div>

  </div>
</div>
